# Blueprint Render — https://render.com/docs/blueprint-spec
# Após o push para o GitHub: New > Blueprint > conecte farollapi-cloud/automa-owhatsapp

databases:
  - name: oficina-db
    databaseName: oficina
    user: oficina

services:
  - type: redis
    name: oficina-redis
    ipAllowList: []

  - type: web
    name: oficina-whatsapp
    runtime: node
    region: oregon
    buildCommand: npm install && npm run migrate
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: oficina-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: oficina-redis
          property: connectionString
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: INTERNAL_NOTIFY_SECRET
        generateValue: true
